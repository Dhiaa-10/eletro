name: eletro
description: "تطبيق Eletro لإدارة عدادات الكهرباء في المجمعات السكنية"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Biometric Authentication
  local_auth: ^2.3.0

  # Storage
  shared_preferences: ^2.5.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.19.0

  cupertino_icons: ^1.0.8
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
